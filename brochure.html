<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#000E88" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Durex – Product Brochure</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N1KVEEMH49"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-N1KVEEMH49');
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --durex-blue: #000E88;
    --durex-blue-dark: #00065C;
    --durex-blue-deep: #000033;
    --durex-pink: #E6126B;
    --white: #ffffff;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--durex-blue);
  }

  body {
    background: linear-gradient(135deg, var(--durex-blue) 0%, var(--durex-blue-dark) 60%, var(--durex-blue-deep) 100%);
    color: var(--white);
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: -20%;
    right: -10%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(230, 18, 107, 0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    bottom: -25%;
    left: -15%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(0, 119, 200, 0.2) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ============================================== */
  /* ============ DESKTOP LAYOUT ================== */
  /* ============================================== */
  .desktop-view {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  .header {
    position: relative;
    z-index: 10;
    padding: 18px 20px 12px;
    text-align: center;
    flex-shrink: 0;
  }

  .header img {
    height: 44px;
    width: auto;
    filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
  }

  .gallery-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    overflow: hidden;
    z-index: 5;
    min-height: 0;
  }

  .gallery {
    position: relative;
    width: 100%;
    max-width: 900px;
    max-height: 100%;
    aspect-ratio: 970 / 600;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.08);
    background: rgba(0, 0, 0, 0.4);
  }

  .slides-horizontal {
    width: 100%;
    height: 100%;
    display: flex;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    cursor: grab;
  }

  .slides-horizontal:active {
    cursor: grabbing;
  }

  .slide-h {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow: hidden;
  }

  .slide-h img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .slide-h img.loaded {
    opacity: 1;
  }

  .nav-bottom {
    position: relative;
    z-index: 10;
    padding: 18px 16px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .arrow {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.98);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--durex-blue);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    transition: all 0.2s ease;
    padding: 0;
  }

  .arrow svg {
    width: 22px;
    height: 22px;
    stroke: var(--durex-blue);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .arrow:hover { transform: scale(1.08); background: white; }
  .arrow:active { transform: scale(0.92); }
  .arrow:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  .counter {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--white);
    background: rgba(255, 255, 255, 0.12);
    padding: 12px 24px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    min-width: 80px;
    text-align: center;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .counter .current { font-weight: 900; font-size: 16px; }
  .counter .total { opacity: 0.7; }

  .dots {
    display: flex;
    gap: 7px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 90vw;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    padding: 0;
  }

  .dot.active {
    background: var(--white);
    width: 26px;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
  }

  /* ============================================== */
  /* ============ MOBILE - TIKTOK VERTICAL ======== */
  /* ============================================== */
  .mobile-view {
    display: none;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .mobile-slides {
    width: 100%;
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -ms-overflow-style: none;
    -webkit-overflow-scrolling: touch;
  }

  .mobile-slides::-webkit-scrollbar {
    display: none;
  }

  .mobile-slide {
    width: 100%;
    height: 100vh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #000;
  }

  .mobile-slide img {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: auto;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: pinch-zoom;
  }

  /* Vertical progress bar - right side */
  .v-progress {
    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  .v-progress-dot {
    width: 4px;
    height: 22px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.3);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .v-progress-dot.active {
    background: var(--white);
    width: 5px;
    height: 32px;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
  }

  .v-progress-dot.passed {
    background: rgba(255, 255, 255, 0.8);
  }

  /* Floating top header with logo and counter */
  .mobile-top {
    position: fixed;
    top: calc(var(--safe-top) + 16px);
    left: 16px;
    right: 16px;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }

  .mobile-top .logo-mini {
    height: 28px;
    width: auto;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
  }

  .mobile-top .count-pill {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    color: white;
  }

  .mobile-top .count-pill .num-current {
    font-weight: 900;
    font-size: 13px;
  }

  .mobile-top .count-pill .num-total {
    opacity: 0.7;
  }

  /* Swipe hint */
  .swipe-hint {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 30px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(20px);
    color: white;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }

  .swipe-hint.show {
    animation: hintShow 3s ease forwards;
  }

  .swipe-hint .arrow-up {
    display: inline-block;
    animation: bounceUp 1.2s ease-in-out infinite;
  }

  @keyframes bounceUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes hintShow {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    20% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  /* ============ MOBILE BREAKPOINT ============ */
  @media (max-width: 768px) and (orientation: portrait) {
    .desktop-view { display: none; }
    .mobile-view { display: block; }
  }

  /* Landscape phones - show desktop */
  @media (max-width: 768px) and (orientation: landscape) {
    .desktop-view { display: flex; }
    .mobile-view { display: none; }
    .header { padding: 8px 16px 4px; }
    .header img { height: 28px; }
    .gallery-container { padding: 4px 12px; }
    .nav-bottom { padding: 8px 12px 12px; gap: 8px; }
    .arrow { width: 38px; height: 38px; }
    .counter { padding: 8px 16px; font-size: 11px; height: 38px; min-width: 60px; }
  }

  /* Tablets */
  @media (min-width: 769px) and (max-width: 1200px) {
    .header img { height: 50px; }
    .gallery { max-width: 800px; }
  }
</style>
</head>
<body>

<!-- ================== DESKTOP VIEW ================== -->
<div class="desktop-view">
  <div class="header">
    <img src="Durex_logo.png" alt="Durex" />
  </div>

  <div class="gallery-container">
    <div class="gallery">
      <div class="slides-horizontal" id="slidesH">
        <div class="slide-h"><img src="slide-01.jpg" alt="Slide 1" loading="eager" /></div>
        <div class="slide-h"><img src="slide-02.jpg" alt="Slide 2" loading="eager" /></div>
        <div class="slide-h"><img src="slide-03.jpg" alt="Slide 3" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-04.jpg" alt="Slide 4" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-05.jpg" alt="Slide 5" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-06.jpg" alt="Slide 6" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-07.jpg" alt="Slide 7" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-08.jpg" alt="Slide 8" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-09.jpg" alt="Slide 9" loading="lazy" /></div>
        <div class="slide-h"><img src="slide-10.jpg" alt="Slide 10" loading="lazy" /></div>
      </div>
    </div>
  </div>

  <div class="nav-bottom">
    <div class="nav-controls">
      <button class="arrow prev" id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="counter">
        <span class="current" id="currentSlide">1</span><span class="total"> / <span id="totalSlides">10</span></span>
      </div>
      <button class="arrow next" id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<!-- ================== MOBILE VIEW (TikTok Style) ================== -->
<div class="mobile-view">

  <!-- Top floating: Logo + Counter -->
  <div class="mobile-top">
    <img src="Durex_logo.png" alt="Durex" class="logo-mini" />
    <div class="count-pill">
      <span class="num-current" id="mobileCurrent">1</span><span class="num-total"> / <span id="mobileTotal">10</span></span>
    </div>
  </div>

  <!-- Vertical scrolling slides -->
  <div class="mobile-slides" id="mobileSlides">
    <div class="mobile-slide" data-index="0"><img src="slide-01.jpg" alt="Slide 1" loading="eager" /></div>
    <div class="mobile-slide" data-index="1"><img src="slide-02.jpg" alt="Slide 2" loading="eager" /></div>
    <div class="mobile-slide" data-index="2"><img src="slide-03.jpg" alt="Slide 3" loading="lazy" /></div>
    <div class="mobile-slide" data-index="3"><img src="slide-04.jpg" alt="Slide 4" loading="lazy" /></div>
    <div class="mobile-slide" data-index="4"><img src="slide-05.jpg" alt="Slide 5" loading="lazy" /></div>
    <div class="mobile-slide" data-index="5"><img src="slide-06.jpg" alt="Slide 6" loading="lazy" /></div>
    <div class="mobile-slide" data-index="6"><img src="slide-07.jpg" alt="Slide 7" loading="lazy" /></div>
    <div class="mobile-slide" data-index="7"><img src="slide-08.jpg" alt="Slide 8" loading="lazy" /></div>
    <div class="mobile-slide" data-index="8"><img src="slide-09.jpg" alt="Slide 9" loading="lazy" /></div>
    <div class="mobile-slide" data-index="9"><img src="slide-10.jpg" alt="Slide 10" loading="lazy" /></div>
  </div>

  <!-- Vertical progress bar -->
  <div class="v-progress" id="vProgress"></div>

  <!-- Swipe hint -->
  <div class="swipe-hint" id="swipeHint">
    <span class="arrow-up">↑</span>
    <span>Swipe up to see more</span>
  </div>

</div>

<script>
  // ============ DESKTOP LOGIC ============
  const slidesH = document.getElementById('slidesH');
  const totalSlides = 10;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const currentSlideEl = document.getElementById('currentSlide');
  const totalSlidesEl = document.getElementById('totalSlides');
  const dotsContainer = document.getElementById('dots');

  let currentIndex = 0;
  totalSlidesEl.textContent = totalSlides;

  // Create dots
  for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goToSlideDesktop(i));
    dotsContainer.appendChild(dot);
  }

  function goToSlideDesktop(index) {
    if (index < 0) index = 0;
    if (index >= totalSlides) index = totalSlides - 1;
    currentIndex = index;
    slidesH.style.transform = `translateX(-${index * 100}%)`;
    currentSlideEl.textContent = index + 1;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === totalSlides - 1;

    trackSlide(index);
  }

  prevBtn.addEventListener('click', () => goToSlideDesktop(currentIndex - 1));
  nextBtn.addEventListener('click', () => goToSlideDesktop(currentIndex + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goToSlideDesktop(currentIndex - 1);
    if (e.key === 'ArrowRight') goToSlideDesktop(currentIndex + 1);
  });

  // Desktop swipe (horizontal)
  let mouseStartX = 0, mouseCurrentX = 0, isMouseDragging = false;

  slidesH.addEventListener('mousedown', (e) => {
    isMouseDragging = true;
    mouseStartX = e.clientX;
    mouseCurrentX = mouseStartX;
    slidesH.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isMouseDragging) return;
    mouseCurrentX = e.clientX;
    const diff = mouseCurrentX - mouseStartX;
    const offset = -(currentIndex * 100) + (diff / slidesH.offsetWidth) * 100;
    slidesH.style.transform = `translateX(${offset}%)`;
  });

  document.addEventListener('mouseup', (e) => {
    if (!isMouseDragging) return;
    isMouseDragging = false;
    slidesH.style.transition = '';
    const diff = mouseStartX - mouseCurrentX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goToSlideDesktop(currentIndex + 1);
      else goToSlideDesktop(currentIndex - 1);
    } else {
      goToSlideDesktop(currentIndex);
    }
  });

  // ============ MOBILE LOGIC ============
  const mobileSlides = document.getElementById('mobileSlides');
  const mobileCurrent = document.getElementById('mobileCurrent');
  const mobileTotal = document.getElementById('mobileTotal');
  const vProgress = document.getElementById('vProgress');
  const swipeHint = document.getElementById('swipeHint');

  mobileTotal.textContent = totalSlides;

  // Create vertical progress dots
  for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('div');
    dot.className = 'v-progress-dot' + (i === 0 ? ' active' : '');
    vProgress.appendChild(dot);
  }

  // Track scroll position to update counter and progress
  let scrollTimeout;
  let lastMobileIndex = 0;

  mobileSlides.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      const scrollTop = mobileSlides.scrollTop;
      const slideHeight = window.innerHeight;
      const index = Math.round(scrollTop / slideHeight);

      if (index !== lastMobileIndex) {
        lastMobileIndex = index;
        mobileCurrent.textContent = index + 1;

        document.querySelectorAll('.v-progress-dot').forEach((d, i) => {
          d.classList.remove('active', 'passed');
          if (i < index) d.classList.add('passed');
          else if (i === index) d.classList.add('active');
        });

        if (navigator.vibrate) navigator.vibrate(8);
        trackSlide(index);
      }
    }, 100);
  });

  // Show swipe up hint first time
  const isMobile = window.matchMedia('(max-width: 768px) and (orientation: portrait)').matches;
  if (isMobile && !sessionStorage.getItem('mobileHintShown')) {
    setTimeout(() => {
      swipeHint.classList.add('show');
      sessionStorage.setItem('mobileHintShown', '1');
    }, 1200);
  }

  // ============ ANALYTICS ============
  function trackSlide(index) {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'slide_view', {
        'event_category': 'Brochure',
        'event_label': `Slide ${index + 1}`,
        'value': index + 1
      });
    }
  }

  // Image load fade-in
  document.querySelectorAll('.slide-h img').forEach(img => {
    if (img.complete && img.naturalHeight > 0) img.classList.add('loaded');
    else img.addEventListener('load', () => img.classList.add('loaded'));
  });

  goToSlideDesktop(0);
</script>

</body>
</html>
