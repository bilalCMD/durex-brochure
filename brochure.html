<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#000E88" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Durex – Product Brochure</title>

  gtag('js', new Date());
  gtag('config', 'G-N1KVEEMH49');

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  :root {
    --durex-blue: #000E88;
    --durex-blue-dark: #00065C;
    --durex-blue-deep: #000033;
    --durex-pink: #E6126B;
    --white: #ffffff;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--durex-blue);
    touch-action: pan-y;
  }

  body {
    background: linear-gradient(135deg, var(--durex-blue) 0%, var(--durex-blue-dark) 60%, var(--durex-blue-deep) 100%);
    color: var(--white);
    display: flex;
    flex-direction: column;
    position: relative;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ============ DESKTOP HEADER ============ */
  .header {
    position: relative;
    z-index: 10;
    padding: 18px 20px 12px;
    text-align: center;
    flex-shrink: 0;
  }

  .header img {
    height: 44px;
    width: auto;
    filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
  }

  /* ============ GALLERY ============ */
  .gallery-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    overflow: hidden;
    z-index: 5;
    min-height: 0;
  }

  .gallery {
    position: relative;
    width: 100%;
    max-width: 900px;
    max-height: 100%;
    aspect-ratio: 970 / 600;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.08);
    background: rgba(0, 0, 0, 0.2);
  }

  .slides {
    width: 100%;
    height: 100%;
    display: flex;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    cursor: grab;
  }

  .slides:active {
    cursor: grabbing;
  }

  .slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .slide-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .slide img.loaded {
    opacity: 1;
  }

  /* ============ DESKTOP ARROW BUTTONS ============ */
  .arrow {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.98);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--durex-blue);
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.4),
      0 0 0 1px rgba(255, 255, 255, 0.1);
    transition: all 0.2s ease;
    font-family: inherit;
    padding: 0;
    flex-shrink: 0;
  }

  .arrow svg {
    width: 22px;
    height: 22px;
    stroke: var(--durex-blue);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .arrow:hover {
    transform: scale(1.08);
    background: white;
  }

  .arrow:active {
    transform: scale(0.92);
  }

  .arrow:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ============ BOTTOM NAV (DESKTOP) ============ */
  .nav-bottom {
    position: relative;
    z-index: 10;
    padding: 18px 16px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .counter {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--white);
    background: rgba(255, 255, 255, 0.12);
    padding: 12px 24px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    min-width: 80px;
    text-align: center;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .counter .current {
    color: var(--white);
    font-weight: 900;
    font-size: 16px;
  }

  .counter .total {
    opacity: 0.7;
  }

  .dots {
    display: flex;
    gap: 7px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 90vw;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    border: none;
    padding: 0;
  }

  .dot.active {
    background: var(--white);
    width: 26px;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
  }

  /* ============ STORIES-STYLE PROGRESS BAR (mobile only) ============ */
  .progress-bar {
    display: none;
  }

  /* ============ MOBILE TAP ZONES (invisible) ============ */
  .tap-zones {
    display: none;
  }

  /* ============ SWIPE HINT (mobile only, first time) ============ */
  .swipe-hint {
    display: none;
  }

  /* ====================================================== */
  /* ============ MOBILE - FULL SCREEN STORIES MODE ====== */
  /* ====================================================== */
  @media (max-width: 768px) and (orientation: portrait) {
    body {
      background: #000;  /* pure black for immersive feel */
    }

    /* Hide desktop header */
    .header {
      display: none;
    }

    /* Hide desktop nav bottom */
    .nav-bottom {
      display: none;
    }

    /* Gallery becomes full screen */
    .gallery-container {
      padding: 0;
      width: 100%;
      height: 100%;
    }

    .gallery {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      aspect-ratio: unset;
      border-radius: 0;
      box-shadow: none;
      background: #000;
    }

    .slide {
      background: #000;
    }

    /* Image rotation - landscape becomes portrait full screen */
    .slide-inner {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide img {
      /* Image is 970x600 (landscape). We rotate 90deg to make it portrait */
      /* After rotation: width=600, height=970 */
      /* We need image's "height" (970) to fill screen height, "width" (600) to fit */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      width: auto;
      height: auto;
      /* Sized dynamically by JS */
      object-fit: contain;
    }

    /* ============ MOBILE: Progress bar at top ============ */
    .progress-bar {
      display: flex;
      position: fixed;
      top: calc(var(--safe-top) + 12px);
      left: 12px;
      right: 12px;
      z-index: 100;
      gap: 4px;
      pointer-events: none;
    }

    .progress-segment {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-segment.completed {
      background: rgba(255, 255, 255, 0.95);
    }

    .progress-segment.active {
      background: rgba(255, 255, 255, 0.3);
    }

    .progress-segment.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: var(--white);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    /* ============ MOBILE: Tap zones for navigation ============ */
    .tap-zones {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
    }

    .tap-zone {
      position: absolute;
      top: 0;
      height: 100%;
      width: 30%;
      pointer-events: auto;
      cursor: pointer;
    }

    .tap-zone.left {
      left: 0;
    }

    .tap-zone.right {
      right: 0;
    }

    /* ============ MOBILE: Floating counter (bottom) ============ */
    .mobile-counter {
      display: flex;
      position: fixed;
      bottom: calc(var(--safe-bottom) + 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: none;
    }

    .mobile-counter .durex-mini {
      height: 18px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .mobile-counter .num {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--white);
    }

    /* ============ MOBILE: Swipe hint (first time) ============ */
    .swipe-hint {
      display: flex;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 90;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      animation: hintFadeOut 3s ease forwards;
      opacity: 0;
    }

    .swipe-hint.show {
      animation: hintFadeOut 3s ease forwards;
    }

    @keyframes hintFadeOut {
      0% { opacity: 0; }
      15% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    }

    .swipe-arrow {
      animation: swipeArrow 1.5s ease-in-out infinite;
    }

    @keyframes swipeArrow {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-8px); }
    }
  }

  /* Hide mobile counter on desktop */
  .mobile-counter {
    display: none;
  }

  /* Landscape phones - keep horizontal desktop view */
  @media (max-height: 500px) and (orientation: landscape) {
    .header {
      padding: 8px 16px 4px;
    }
    .header img {
      height: 28px;
    }
    .gallery-container {
      padding: 4px 12px;
    }
    .gallery {
      aspect-ratio: 970 / 600;
    }
    .nav-bottom {
      padding: 8px 12px 12px;
      gap: 8px;
    }
    .arrow {
      width: 38px;
      height: 38px;
    }
    .counter {
      padding: 8px 16px;
      font-size: 11px;
      height: 38px;
      min-width: 60px;
    }
  }

  /* Tablets */
  @media (min-width: 769px) and (max-width: 1200px) {
    .header img { height: 50px; }
    .gallery { max-width: 800px; }
  }
</style>
</head>
<body>

<!-- DESKTOP HEADER -->
<div class="header">
  <img src="Durex_logo.png" alt="Durex" />
</div>

<!-- MOBILE: Stories-style progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- GALLERY -->
<div class="gallery-container">
  <div class="gallery">
    <div class="slides" id="slides">
      <div class="slide"><div class="slide-inner"><img src="slide-01.jpg" alt="Durex Slide 1" loading="eager" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-02.jpg" alt="Durex Slide 2" loading="eager" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-03.jpg" alt="Durex Slide 3" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-04.jpg" alt="Durex Slide 4" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-05.jpg" alt="Durex Slide 5" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-06.jpg" alt="Durex Slide 6" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-07.jpg" alt="Durex Slide 7" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-08.jpg" alt="Durex Slide 8" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-09.jpg" alt="Durex Slide 9" loading="lazy" /></div></div>
      <div class="slide"><div class="slide-inner"><img src="slide-10.jpg" alt="Durex Slide 10" loading="lazy" /></div></div>
    </div>
  </div>
</div>

<!-- MOBILE: Tap zones for navigation -->
<div class="tap-zones">
  <div class="tap-zone left" id="tapLeft"></div>
  <div class="tap-zone right" id="tapRight"></div>
</div>

<!-- MOBILE: Floating counter at bottom -->
<div class="mobile-counter">
  <img src="Durex_logo.png" alt="Durex" class="durex-mini" />
  <span class="num"><span id="mobileCurrent">1</span> / <span id="mobileTotal">10</span></span>
</div>

<!-- MOBILE: First-time swipe hint -->
<div class="swipe-hint" id="swipeHint">
  <span class="swipe-arrow">←</span>
  <span>Swipe to navigate</span>
</div>

<!-- DESKTOP: Bottom nav -->
<div class="nav-bottom">
  <div class="nav-controls">
    <button class="arrow prev" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="counter">
      <span class="current" id="currentSlide">1</span><span class="total"> / <span id="totalSlides">10</span></span>
    </div>
    <button class="arrow next" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<script>
  const slides = document.getElementById('slides');
  const totalSlides = document.querySelectorAll('.slide').length;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const currentSlideEl = document.getElementById('currentSlide');
  const totalSlidesEl = document.getElementById('totalSlides');
  const dotsContainer = document.getElementById('dots');
  const progressBar = document.getElementById('progressBar');
  const tapLeft = document.getElementById('tapLeft');
  const tapRight = document.getElementById('tapRight');
  const mobileCurrent = document.getElementById('mobileCurrent');
  const mobileTotal = document.getElementById('mobileTotal');
  const swipeHint = document.getElementById('swipeHint');

  let currentIndex = 0;
  totalSlidesEl.textContent = totalSlides;
  mobileTotal.textContent = totalSlides;

  // Detect mobile portrait
  function isMobilePortrait() {
    return window.matchMedia('(max-width: 768px) and (orientation: portrait)').matches;
  }

  // Apply image rotation sizing for mobile
  function applyMobileRotation() {
    const mobile = isMobilePortrait();
    document.querySelectorAll('.slide-inner').forEach(inner => {
      const img = inner.querySelector('img');
      if (mobile) {
        const rect = inner.getBoundingClientRect();
        const screenW = rect.width;
        const screenH = rect.height;

        // Image is 970x600 landscape. After rotating 90deg:
        // - image's "width" (970) becomes vertical extent
        // - image's "height" (600) becomes horizontal extent
        // We want to FILL the screen (cover entire portrait area)
        const imgAspect = 970 / 600;

        // To cover: image's rotated height (= original width) should match screen height
        // and rotated width (= original height) should match or exceed screen width
        let imgH, imgW;

        // Option A: Fill height (rotated image height = screen height)
        imgH = screenH; // this is the "width" before rotation
        imgW = screenH / imgAspect; // this is the "height" before rotation

        // Make sure it covers width too
        if (imgW < screenW) {
          imgW = screenW;
          imgH = screenW * imgAspect;
        }

        // Set: img's CSS width = rotated width (before rotation it's the height after)
        // Actually: we set width = imgH and height = imgW because of the rotation
        img.style.width = imgH + 'px';
        img.style.height = imgW + 'px';
      } else {
        img.style.width = '';
        img.style.height = '';
      }
    });
  }

  // Create dots (desktop)
  for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  }

  // Create progress bar segments (mobile)
  for (let i = 0; i < totalSlides; i++) {
    const seg = document.createElement('div');
    seg.className = 'progress-segment';
    if (i === 0) seg.classList.add('active');
    progressBar.appendChild(seg);
  }

  function updateProgressBar(index) {
    document.querySelectorAll('.progress-segment').forEach((seg, i) => {
      seg.classList.remove('completed', 'active');
      if (i < index) seg.classList.add('completed');
      else if (i === index) seg.classList.add('active');
    });
  }

  function goToSlide(index) {
    if (index < 0) index = 0;
    if (index >= totalSlides) index = totalSlides - 1;
    currentIndex = index;
    slides.style.transform = `translateX(-${index * 100}%)`;
    currentSlideEl.textContent = index + 1;
    mobileCurrent.textContent = index + 1;

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });

    updateProgressBar(index);

    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === totalSlides - 1;

    if (navigator.vibrate) navigator.vibrate(10);

    if (typeof gtag !== 'undefined') {
      gtag('event', 'slide_view', {
        'event_category': 'Brochure',
        'event_label': `Slide ${index + 1}`,
        'value': index + 1
      });
    }
  }

  prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
  nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

  // Mobile tap zones
  tapLeft.addEventListener('click', () => goToSlide(currentIndex - 1));
  tapRight.addEventListener('click', () => goToSlide(currentIndex + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
    if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
  });

  // Touch/swipe
  let touchStartX = 0, touchCurrentX = 0, touchStartTime = 0;
  let isDragging = false;

  slides.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchCurrentX = touchStartX;
    touchStartTime = Date.now();
    isDragging = true;
    slides.style.transition = 'none';
  }, { passive: true });

  slides.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    touchCurrentX = e.changedTouches[0].clientX;
    const diff = touchCurrentX - touchStartX;
    const offset = -(currentIndex * 100) + (diff / slides.offsetWidth) * 100;
    slides.style.transform = `translateX(${offset}%)`;
  }, { passive: true });

  slides.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    isDragging = false;
    slides.style.transition = '';
    const diff = touchStartX - touchCurrentX;
    const duration = Date.now() - touchStartTime;
    const threshold = slides.offsetWidth * 0.2;

    if (duration < 250 && Math.abs(diff) > 30) {
      if (diff > 0) goToSlide(currentIndex + 1);
      else goToSlide(currentIndex - 1);
    } else if (Math.abs(diff) > threshold) {
      if (diff > 0) goToSlide(currentIndex + 1);
      else goToSlide(currentIndex - 1);
    } else {
      goToSlide(currentIndex);
    }
  });

  // Mouse drag (desktop)
  let mouseStartX = 0, mouseCurrentX = 0, isMouseDragging = false;

  slides.addEventListener('mousedown', (e) => {
    isMouseDragging = true;
    mouseStartX = e.clientX;
    mouseCurrentX = mouseStartX;
    slides.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isMouseDragging) return;
    mouseCurrentX = e.clientX;
    const diff = mouseCurrentX - mouseStartX;
    const offset = -(currentIndex * 100) + (diff / slides.offsetWidth) * 100;
    slides.style.transform = `translateX(${offset}%)`;
  });

  document.addEventListener('mouseup', (e) => {
    if (!isMouseDragging) return;
    isMouseDragging = false;
    slides.style.transition = '';
    const diff = mouseStartX - mouseCurrentX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goToSlide(currentIndex + 1);
      else goToSlide(currentIndex - 1);
    } else {
      goToSlide(currentIndex);
    }
  });

  // Image load
  document.querySelectorAll('.slide img').forEach(img => {
    if (img.complete && img.naturalHeight > 0) {
      img.classList.add('loaded');
      setTimeout(applyMobileRotation, 50);
    } else {
      img.addEventListener('load', () => {
        img.classList.add('loaded');
        setTimeout(applyMobileRotation, 50);
      });
    }
  });

  // Apply on load and resize
  window.addEventListener('load', () => {
    setTimeout(applyMobileRotation, 100);
  });

  window.addEventListener('resize', () => {
    applyMobileRotation();
  });

  window.addEventListener('orientationchange', () => {
    setTimeout(applyMobileRotation, 200);
  });

  // Show swipe hint first time on mobile
  if (isMobilePortrait() && !sessionStorage.getItem('hintShown')) {
    setTimeout(() => {
      swipeHint.classList.add('show');
      sessionStorage.setItem('hintShown', '1');
    }, 1000);
  }

  goToSlide(0);
  setTimeout(applyMobileRotation, 100);
</script>

</body>
</html>
